<head>

    <title>联系方式</title>
    <style>
        .navbar {
            background-color: #2c3e50;
            overflow: hidden;
            position: fixed; /* 固定定位 */
            top: 0;          /* 固定在顶部 */
            width: 100%;     /* 宽度占满屏幕 */
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
.dropdown {
            float: left;
            overflow: hidden;
        }
        .dropbtn {
            font-size: 16px;
            border: none;
            outline: none;
            color: white;
            padding: 14px 20px;
            background-color: inherit;
            font-family: inherit;
            margin: 0;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }
        /* 导航栏样式 */
        .navbar {
            background-color: #2c3e50;
            position: fixed;
            top: 0;
            width: 100%;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #34495e;
        }
        /* 内容区样式 */
        .content {
            margin-top: 80px;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
  <a href="index.html">首页</a>
