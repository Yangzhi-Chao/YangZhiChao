<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>联系方式</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #f8f9fa;
        }

        /* 导航栏样式 */
        .navbar {
            background-color: #2c3e50;
            overflow: hidden;
            position: fixed;
            top: 0;
            width: 100%;
        }

        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #3498db;
        }

        /* 主要内容区 */
        .content {
            text-align: center;
            padding-top: 100px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #165DFF;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .contact-info {
            text-align: left;
            font-size: 20px;
            color: #34495e;
            line-height: 2;
        }

        .contact-info a {
            color: #165DFF;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
        <a href="index.html">首页</a>
        <div class="dropdown">
            <a href="about.html" class="dropbtn">关于我</a>
            <div class="dropdown-content">
                <a href="about.html#profile">个人简介</a>
                <a href="about.html#hobbies">兴趣爱好</a>
                <a href="about.html#skills">我的技能</a>
            </div>
        </div>
        <a href="contact.html">联系方式</a>
        <a href="#login" style="float:right; background-color: #3498db;">登录</a>
    </div>

    <!-- 主要内容 -->
    <div class="content">
        <h1>联系方式</h1>
        <div class="contact-info">
            <p>📧 邮箱：<a href="mailto:your-email@example.com">your-email@example.com</a></p>
            <p>📱 电话：138-0000-0000</p>
            <p>💬 微信：your-wechat-id</p>
        </div>
    </div>
</body>
</html>
