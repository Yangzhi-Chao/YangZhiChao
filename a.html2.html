<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的第一个网页</title>
    <style>
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding-top: 80px;
            margin: 0;
        }
        h1 {
            color: #2c3e50;
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            color: #34495e;
            font-size: 20px;
            margin-bottom: 40px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h1>🎉 我成功做出网站啦！</h1>
    <p>这是我用 VS Code 写的第一个网页，感觉超酷！</p>
    <button onclick="alert('太棒了！你已经成功入门网页开发了！')">
        点我试试
    </button>
</body>
</html>
